# Render Blueprint: https://render.com/docs/blueprint-spec
# After push: New > Blueprint > connect repo, add MONGODB_URI in dashboard (optional but recommended).

services:
  - type: web
    name: ipl-auction
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
